# 第一阶段 clean baseline 候选配置。
# 目标不是追求当前最高分，而是建立一个更可信、可复现、可归因的最小 finetune 基线：
# - encoder: 只用 H_disease
# - scorer: cosine
# - case_refiner: 关闭
# - poly: 关闭
# - hard_negative: 关闭
# - hpo_corruption_prob: 关闭
# - readout: 保留最小必要 hyperedge readout，并用 residual_uniform=1.0 退化为均匀聚合

paths:
  train_files:
    - D:\RareDisease-traindata\LLLdataset\dataset\processed\train\DDD.csv
    - D:\RareDisease-traindata\LLLdataset\dataset\processed\train\HMS.xlsx
    - D:\RareDisease-traindata\LLLdataset\dataset\processed\train\LIRICAL.xlsx
    - D:\RareDisease-traindata\LLLdataset\dataset\processed\train\MME.xlsx
    - D:\RareDisease-traindata\LLLdataset\dataset\processed\train\MyGene2.xlsx
    - D:\RareDisease-traindata\LLLdataset\dataset\processed\train\RAMEDIS.xlsx
    - D:\RareDisease-traindata\LLLdataset\dataset\processed\mimic_rag_0425.csv
    - D:\RareDisease-traindata\LLLdataset\dataset\processed\FakeDisease.xlsx
  hpo_index_path: D:\RareDisease-traindata\LLLdataset\DiseaseHy\processed\HPO_index_v4.xlsx
  disease_index_path: D:\RareDisease-traindata\LLLdataset\DiseaseHy\processed\Disease_index_v4.xlsx
  # Safe default: v59 disease hyperedge. Do not switch back to v60 for evaluation-comparable runs.
  disease_incidence_path: D:\RareDisease-traindata\LLLdataset\DiseaseHy\rare_disease_hgnn_clean_package_v59\v59DiseaseHy.npz
  save_dir: D:\RareDisease-traindata\outputs\stage2_finetune_clean_baseline_v59

data:
  batch_size: 16
  val_ratio: 0.1
  shuffle: true
  random_seed: 42

model:
  hidden_dim: 128
  case_refiner:
    enabled: false
    mlp_hidden_dim: 128
    residual: 0.1
  readout:
    type: hyperedge
    attn_hidden_dim: 128
    attn_dropout: 0.0
    context_mode: leave_one_out
    residual_uniform: 1.0
    return_attention: false

loss:
  loss_name: full_pool_ce
  poly_epsilon: 0.0
  temperature: 0.18
  hard_negative:
    use_hard_negative: false
    k: 0
    top_m: 0
    start_epoch: 0
    weight: 0.0
    margin: 0.0

optimizer:
  lr: 0.0001
  weight_decay: 0.0002

train:
  num_epochs: 50
  device: cuda
  init_checkpoint_path: D:\RareDisease-traindata\outputs\stage1_pretrain_v59\checkpoints\best.pt
  hpo_dropout_prob: 0.0
  hpo_corruption_prob: 0.0
  eval_every: 1
  log_every: 96
  early_stop: true
  early_stop_patience: 5
  monitor: val_top1
  monitor_mode: max
  save_best: true
  save_last: true
  save_every_eval: false
  grad_clip_norm: null
  num_workers: 0
