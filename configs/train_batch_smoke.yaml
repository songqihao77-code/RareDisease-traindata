paths:
  train_files:
    - D:\RareDisease-traindata\data\processed\train\DDD.xlsx
    - D:\RareDisease-traindata\data\processed\train\HMS.xlsx
  hpo_index_path: D:\RareDisease-traindata\data\processed\vocab\HPO_index_v2.xlsx
  disease_index_path: D:\RareDisease-traindata\data\processed\vocab\Disease_index_v2.xlsx
  disease_incidence_path: D:\RareDisease-traindata\data\processed\knowledge\DiseaseHyperedge_sparse_triplets_v2.npz
  save_dir: D:\RareDisease-traindata\outputs\batch_smoke

data:
  batch_size: 8
  val_ratio: 0.1
  shuffle: true
  random_seed: 42

model:
  hidden_dim: 128
  readout:
    type: hyperedge
    attn_hidden_dim: 128
    attn_dropout: 0.1
    context_mode: leave_one_out
    residual_uniform: 0.2
    return_attention: false

loss:
  loss_name: full_pool_ce
  temperature: 0.18

optimizer:
  lr: 0.001
  weight_decay: 0.0002

train:
  num_epochs: 2
  device: cpu
  hpo_dropout_prob: 0.4
  eval_every: 1
  log_every: 96
  early_stop: true
  early_stop_patience: 5
  monitor: val_top1
  monitor_mode: max
  save_best: true
  save_last: true
  save_every_eval: true
  grad_clip_norm: null
  num_workers: 0
