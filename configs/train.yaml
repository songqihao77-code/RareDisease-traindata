paths:
  train_dir: D:\RareDisease-traindata\LLLdataset\dataset\processed\train
  hpo_index_path: D:\RareDisease-traindata\LLLdataset\DiseaseHy\processed\HPO_index_v4.xlsx
  disease_index_path: D:\RareDisease-traindata\LLLdataset\DiseaseHy\processed\Disease_index_v4.xlsx
  disease_incidence_path: D:\RareDisease-traindata\LLLdataset\dataset\rare_disease_hgnn_clean_package_v59\v59DiseaseHy.npz
  save_dir: D:\RareDisease-traindata\outputs

data:
  batch_size: 8
  val_ratio: 0.1
  shuffle: true
  random_seed: 42

model:
  hidden_dim: 128
  case_refiner:
    enabled: true
    mlp_hidden_dim: 128
    residual: 0.7
  readout:
    type: hyperedge
    attn_hidden_dim: 128
    attn_dropout: 0.1
    context_mode: leave_one_out
    residual_uniform: 0.2
    return_attention: false

loss:
  loss_name: full_pool_ce
  temperature: 0.18

optimizer:
  lr: 0.001
  weight_decay: 0.0002

train:
  num_epochs: 150
  device: cuda
  hpo_dropout_prob: 0.4
  eval_every: 1
  log_every: 96
  early_stop: true
  early_stop_patience: 5
  monitor: val_top1
  monitor_mode: max
  save_best: true
  save_last: true
  save_every_eval: true
  grad_clip_norm: null
  num_workers: 0
