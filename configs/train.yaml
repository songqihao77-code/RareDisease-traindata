paths:
  train_dir: D:\RareDisease\data\processed\train
  hpo_index_path: D:\RareDisease\data\processed\vocab\HPO_index_v2.xlsx
  disease_index_path: D:\RareDisease\data\processed\vocab\Disease_index_v2.xlsx
  disease_incidence_path: D:\RareDisease\data\processed\knowledge\DiseaseHyperedge_sparse_triplets_v2.npz
  save_dir: D:\RareDisease\outputs

data:
  batch_size: 8
  val_ratio: 0.1
  shuffle: true
  random_seed: 42

model:
  hidden_dim: 128

loss:
  loss_name: full_pool_ce
  temperature: 0.18

optimizer:
  lr: 0.001
  weight_decay: 0.0001

train:
  num_epochs: 150
  device: cuda
  eval_every: 1
  log_every: 96
  early_stop: true
  early_stop_patience: 5
  monitor: val_top1
  monitor_mode: max
  save_best: true
  save_last: true
  save_every_eval: true
  grad_clip_norm: null
  num_workers: 0
