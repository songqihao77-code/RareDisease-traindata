# 非主线样例配置。
# 当前唯一可信主线不是本文件，而是：
#   run_full_train.cmd
#     -> configs/train_pretrain.yaml
#     -> configs/train_finetune.yaml
#     -> configs/data_llldataset_eval.yaml
# 本文件仅作为显式样例/实验模板保留，不应被视为默认主实验入口。

paths:
  train_files:
    # 非主线样例数据清单。
    - D:\RareDisease-traindata\LLLdataset\dataset\processed\train\DDD.csv
    - D:\RareDisease-traindata\LLLdataset\dataset\processed\train\HMS.xlsx
    - D:\RareDisease-traindata\LLLdataset\dataset\processed\train\LIRICAL.xlsx
    - D:\RareDisease-traindata\LLLdataset\dataset\processed\train\MME.xlsx
    - D:\RareDisease-traindata\LLLdataset\dataset\processed\train\MyGene2.xlsx
    - D:\RareDisease-traindata\LLLdataset\dataset\processed\train\RAMEDIS.xlsx
    - D:\RareDisease-traindata\LLLdataset\dataset\processed\mimic_rag_0425.csv
    - D:\RareDisease-traindata\LLLdataset\dataset\processed\FakeDisease.xlsx
    - D:\RareDisease-traindata\LLLdataset\dataset\rare_disease_hgnn_training_package_v6\all_diseases_5_to_15_profiles_minimal.xlsx
  hpo_index_path: D:\RareDisease-traindata\LLLdataset\DiseaseHy\processed\HPO_index_v4.xlsx
  disease_index_path: D:\RareDisease-traindata\LLLdataset\DiseaseHy\processed\Disease_index_v4.xlsx
  disease_incidence_path: D:\RareDisease-traindata\LLLdataset\DiseaseHy\rare_disease_hgnn_clean_package_v59\v59DiseaseHy.npz
  save_dir: D:\RareDisease-traindata\outputs\non_mainline_sample

data:
  batch_size: 16
  val_ratio: 0.1
  shuffle: true
  random_seed: 42

model:
  hidden_dim: 128
  case_refiner:
    enabled: true
    mlp_hidden_dim: 128
    residual: 0.1
  readout:
    type: hyperedge
    attn_hidden_dim: 128
    attn_dropout: 0.1
    context_mode: leave_one_out
    residual_uniform: 0.2
    return_attention: false
    attn_prior_mode: none
    attn_prior_beta: 0.0
    attn_prior_learnable: false
    attn_prior_normalize: center
    attn_prior_eps: 1.0e-8

loss:
  loss_name: full_pool_ce
  poly_epsilon: 0.0
  temperature: 0.18
  hard_negative:
    use_hard_negative: false
    k: 0
    top_m: 0
    start_epoch: 0
    weight: 0.0
    margin: 0.0

optimizer:
  lr: 0.001
  weight_decay: 0.0002

train:
  num_epochs: 150
  device: cuda
  hpo_dropout_prob: 0.4
  eval_every: 1
  log_every: 96
  early_stop: true
  early_stop_patience: 5
  monitor: val_top1
  monitor_mode: max
  save_best: true
  save_last: true
  save_every_eval: true
  grad_clip_norm: null
  num_workers: 0
